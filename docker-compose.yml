services:
  postgres:
    image: postgres:16-alpine
    container_name: jdr_ia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jdr_user
      POSTGRES_PASSWORD: jdr_password
      POSTGRES_DB: jdr_ia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdr_user -d jdr_ia"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
