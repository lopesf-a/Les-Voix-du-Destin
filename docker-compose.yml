services:
  postgres:
    image: postgres:16-alpine
    container_name: les_voix_du_destin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jdr_user
      POSTGRES_PASSWORD: jdr_password
      POSTGRES_DB: les_voix_du_destin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdr_user -d les_voix_du_destin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
