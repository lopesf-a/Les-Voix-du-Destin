name: CI - JDR IA Mistral

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jdr_user
          POSTGRES_PASSWORD: jdr_password
          POSTGRES_DB: jdr_ia
        ports:
          - 5432:5432

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Générer Prisma
        run: npm run prisma:generate --workspace backend
        env:
          DATABASE_URL: postgresql://jdr_user:jdr_password@localhost:5432/jdr_ia?schema=public
          JWT_SECRET: test-secret-minimum-12
          MISTRAL_API_KEY: ""
          CORS_ORIGIN: http://localhost:5173

      - name: Vérifier le backend
        run: npm run lint --workspace backend
        env:
          DATABASE_URL: postgresql://jdr_user:jdr_password@localhost:5432/jdr_ia?schema=public
          JWT_SECRET: test-secret-minimum-12

      - name: Vérifier le frontend
        run: npm run lint --workspace frontend

      - name: Build complet
        run: npm run build
        env:
          DATABASE_URL: postgresql://jdr_user:jdr_password@localhost:5432/jdr_ia?schema=public
          JWT_SECRET: test-secret-minimum-12
          PUBLIC_API_URL: http://localhost:3001/api